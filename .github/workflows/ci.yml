name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.6.0"
          use-public-rspm: true

      - name: Install R compute test dependencies
        shell: bash
        run: |
          r_site_lib="$(R_LIBS_USER= Rscript -e 'cat(.libPaths()[1])')"
          sudo mkdir -p "$r_site_lib"
          sudo chown -R "$USER" "$r_site_lib"
          for attempt in 1 2 3; do
            if R_SITE_LIB="$r_site_lib" R_LIBS_USER= Rscript -e 'options(timeout = 300); version <- "0.8.0"; url <- sprintf("https://cloud.r-project.org/src/contrib/Archive/nanoarrow/nanoarrow_%s.tar.gz", version); lib <- Sys.getenv("R_SITE_LIB"); install.packages(url, lib = lib, repos = NULL, type = "source"); stopifnot(as.character(packageVersion("nanoarrow", lib.loc = lib)) == version)'; then
              R_LIBS_USER= Rscript -e 'stopifnot(requireNamespace("nanoarrow", quietly = TRUE))'
              exit 0
            fi
            sleep $((attempt * 10))
          done
          exit 1

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Provision DuckHTS
        run: npm run provision:duckhts

      - name: Typecheck and test
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

  owned-ducknng:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Cache owned ducknng build
        uses: actions/cache@v4
        with:
          path: |
            .pi/ducknng
            .pi/src/ducknng
          key: owned-ducknng-${{ runner.os }}-${{ hashFiles('package-lock.json', 'scripts/provision-ducknng-owned.sh') }}

      - name: Provision and verify owned ducknng
        run: |
          npm run provision:ducknng-owned
          duckdb_version="$(node -e 'process.stdout.write(require("@duckdb/node-api/package.json").version.replace(/-.*/, ""))')"
          echo "DUCKNNG_EXTENSION_PATH=$PWD/.pi/ducknng/duckdb-${duckdb_version}/ducknng.duckdb_extension" >> "$GITHUB_ENV"

      - name: Compile integration tests
        run: rm -rf dist-test && npx tsc -p tsconfig.test.json

      - name: Exercise owned transport, auth, retry, upload, TLS, and RPC
        run: >-
          node --test
          dist-test/test/ncurl-retry.test.js
          dist-test/test/ncurl-fanout.test.js
          dist-test/test/ducknng-sql-http.test.js
          dist-test/test/ducknng-http-profiles.test.js
          dist-test/test/ducknng-upload-shared-data.test.js
          dist-test/test/ducknng-tls-auth.test.js
          dist-test/test/ducknng-rpc-mutate.test.js
          dist-test/test/ducknng-rpc-blackboard.test.js
          dist-test/test/ducknng-socket-reachability.test.js

      - name: Require upload dogfood (no skipped lane)
        run: npm run dogfood:ducknng-upload
